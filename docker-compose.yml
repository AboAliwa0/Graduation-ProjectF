services:
  cyberscan:
    build: .
    env_file: .env
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - cyberscan-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  cyberscan-data:
