<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="dashboard">

    <!-- Header -->
    <div class="header">
        <h1> Vulnerability Scanner</h1>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- Scan Box -->
    <div class="card">

        <form method="POST">

            <div class="input-group">
                <label>Target URL</label>
                <input type="text" name="url" placeholder="https://example.com" required>
            </div>

            <h3 class="section-title">Select Vulnerabilities</h3>

            <div class="checkbox-grid">

                <label><input type="checkbox" name="vuln" value="blind_xss"> Blind XSS</label>
                <label><input type="checkbox" name="vuln" value="file_upload"> File Upload</label>
                <label><input type="checkbox" name="vuln" value="html_injection"> HTML Injection</label>
                <label><input type="checkbox" name="vuln" value="idor"> IDOR</label>
                <label><input type="checkbox" name="vuln" value="path_traversal"> Path Traversal</label>
                <label><input type="checkbox" name="vuln" value="rate_limit"> Rate Limit</label>
                <label><input type="checkbox" name="vuln" value="sql_injection"> SQL Injection</label>
                <label><input type="checkbox" name="vuln" value="ssrf"> SSRF</label>
                <label><input type="checkbox" name="vuln" value="xss"> XSS</label>

            </div>

            <button class="btn scan-btn">Start Scan</button>

        </form>

    </div>

</div>

</body>
</html>
