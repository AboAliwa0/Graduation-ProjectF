<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberScan — Security Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0C1929;--card:rgba(24,40,64,0.6);--card-hover:rgba(30,51,82,0.7);--border:rgba(91,141,184,0.18);--border-h:rgba(91,141,184,0.35);--accent:#5B8DB8;--cyan:#67C5E8;--crit:#EF4444;--high:#F97316;--med:#EAB308;--low:#22C55E;--info:#3B82F6;--text:#CBD5E1;--dim:#64748B;--white:#fff}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(91,141,184,0.3);border-radius:3px}
    .grid-bg{background-image:linear-gradient(rgba(91,141,184,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,184,0.03) 1px,transparent 1px);background-size:40px 40px}

    /* ─── TOP BAR ─── */
    .topbar{position:sticky;top:0;z-index:50;background:rgba(12,25,41,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px;color:#fff}
    .logo-text{font-size:1rem;font-weight:700;color:#fff}
    .logo-text span{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .top-actions{display:flex;align-items:center;gap:6px}
    .tbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:0.78rem;font-weight:600;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
    .tbtn svg{width:15px;height:15px;flex-shrink:0}
    .tbtn-pri{background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;box-shadow:0 3px 10px rgba(91,141,184,0.3)}
    .tbtn-pri:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(91,141,184,0.4)}
    .tbtn-sec{background:rgba(255,255,255,0.05);color:#E2E8F0;border:1px solid rgba(255,255,255,0.1)}
    .tbtn-sec:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2)}
    .tbtn-icon{padding:7px;border-radius:7px;background:none;border:1px solid rgba(255,255,255,0.05);color:#94A3B8;cursor:pointer;transition:all .2s;position:relative}
    .tbtn-icon:hover{background:rgba(255,255,255,0.05);color:#E2E8F0}
    .tbtn-icon svg{width:17px;height:17px}
    .sep{width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 2px}
    .notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--crit);border-radius:50%;border:1.5px solid var(--bg)}

    /* ─── SITE SWITCHER BAR ─── */
    .sites-bar{padding:16px 24px 0;max-width:1400px;margin:0 auto}
    .sites-bar-label{font-size:0.72rem;color:var(--dim);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
    .sites-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
    .site-chip{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s;white-space:nowrap;font-size:0.8rem;color:#94A3B8;font-weight:500}
    .site-chip:hover{border-color:var(--border-h);color:#E2E8F0;background:var(--card-hover)}
    .site-chip.active{background:rgba(91,141,184,0.15);border-color:rgba(91,141,184,0.4);color:var(--cyan);font-weight:600}
    .site-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .site-chip .chip-count{font-size:0.68rem;background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:4px;color:var(--dim)}
    .site-chip.active .chip-count{background:rgba(91,141,184,0.2);color:var(--accent)}
    .chip-status{font-size:0.65rem;font-weight:600}

    /* ─── MAIN ─── */
    .main{max-width:1400px;margin:0 auto;padding:16px 24px 32px}

    /* ─── STATS ROW ─── */
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:all .25s}
    .stat:hover{border-color:var(--border-h);background:var(--card-hover)}
    .stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .stat-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center}
    .stat-icon svg{width:16px;height:16px}
    .stat-label{font-size:0.7rem;color:var(--dim);font-weight:500}
    .stat-val{font-size:1.5rem;font-weight:700;color:#fff}
    .stat-sub{font-size:0.68rem;color:var(--dim);margin-top:2px}

    /* ─── CONTENT GRID ─── */
    .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:all .25s}
    .card:hover{border-color:var(--border-h)}
    .card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .card-title{font-size:0.85rem;font-weight:600;color:#fff}
    .card-sub{font-size:0.68rem;color:var(--dim);margin-top:1px}
    .card-btns{display:flex;gap:4px}
    .card-btn{padding:4px 9px;border-radius:5px;font-size:0.68rem;font-weight:500;border:none;cursor:pointer;transition:all .2s}
    .card-btn-on{background:rgba(91,141,184,0.15);color:var(--accent)}
    .card-btn-off{background:none;color:#94A3B8}
    .card-btn-off:hover{background:rgba(255,255,255,0.05)}

    /* ─── BAR CHART ─── */
    .bars{display:flex;align-items:flex-end;gap:16px;height:150px;padding:0 8px}
    .bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
    .bar-val{font-size:0.72rem;font-weight:600}
    .bar-fill{width:100%;border-radius:5px 5px 0 0;opacity:0.85;transition:opacity .3s;cursor:pointer;position:relative}
    .bar-fill:hover{opacity:1}
    .bar-lbl{font-size:0.65rem;color:var(--dim);margin-top:3px}

    /* ─── DONUT ─── */
    .donut-wrap{display:flex;align-items:center;gap:16px}
    .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .donut-total{font-size:1.2rem;font-weight:700;color:#fff}
    .donut-lbl{font-size:0.65rem;color:var(--dim)}
    .legend{display:flex;flex-direction:column;gap:6px}
    .leg-item{display:flex;align-items:center;gap:7px}
    .leg-dot{width:8px;height:8px;border-radius:50%}
    .leg-name{font-size:0.68rem;color:var(--text);width:48px}
    .leg-val{font-size:0.68rem;font-weight:600;color:#E2E8F0}

    /* ─── FINDINGS TABLE ─── */
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{text-align:left;font-size:0.68rem;font-weight:500;color:var(--dim);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05)}
    .tbl td{padding:8px 10px 8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.78rem;vertical-align:middle}
    .tbl tr:hover td{background:rgba(91,141,184,0.05)}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:0.65rem;font-weight:500}
    .b-crit{background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3)}
    .b-high{background:rgba(249,115,22,0.15);color:#F97316;border:1px solid rgba(249,115,22,0.3)}
    .b-med{background:rgba(234,179,8,0.15);color:#EAB308;border:1px solid rgba(234,179,8,0.3)}
    .b-low{background:rgba(34,197,94,0.15);color:#22C55E;border:1px solid rgba(34,197,94,0.3)}
    .b-info{background:rgba(59,130,246,0.15);color:#3B82F6;border:1px solid rgba(59,130,246,0.3)}

    /* ─── SEVERITY BAR ─── */
    .sev-bar-wrap{height:6px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden;display:flex;margin-top:8px}
    .sev-seg{height:100%;transition:width .5s ease-out}

    /* ─── PROGRESS RING ─── */
    .ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
    .ring-text{position:absolute;font-size:1.1rem;font-weight:700;color:#fff}
    .ring-lbl{position:absolute;bottom:-2px;font-size:0.55rem;color:var(--dim)}

    /* ─── MODAL ─── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(12,25,41,0.85);z-index:100;justify-content:center;align-items:center}
    .modal-bg.open{display:flex}
    .modal{background:rgba(30,51,82,0.95);border:1px solid var(--border-h);border-radius:14px;padding:24px;max-width:500px;width:92%;max-height:80vh;overflow-y:auto}
    .modal-title{font-size:1rem;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .modal-close{background:none;border:none;color:#94A3B8;cursor:pointer;font-size:1.4rem;line-height:1;padding:2px}
    .modal-close:hover{color:#fff}
    .input-field{background:rgba(24,40,64,0.7);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:#E2E8F0;font-size:0.82rem;width:100%;outline:none;transition:border .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:#475569}
    .select-field{background:rgba(24,40,64,0.7);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:#E2E8F0;font-size:0.78rem;outline:none;cursor:pointer;width:100%}
    .select-field:focus{border-color:var(--accent)}
    .form-label{font-size:0.75rem;color:var(--dim);display:block;margin-bottom:5px;font-weight:500}
    .form-row{margin-bottom:14px}
    .cb-group{display:flex;flex-wrap:wrap;gap:6px}
    .cb-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;background:rgba(24,40,64,0.5);border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:0.75rem;color:#94A3B8}
    .cb-item:hover{border-color:var(--border-h);color:#E2E8F0}
    .cb-item.checked{background:rgba(91,141,184,0.15);border-color:rgba(91,141,184,0.4);color:var(--accent)}

    /* ─── TOAST ─── */
    .toast-box{position:fixed;top:70px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px}
    .toast{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;background:rgba(30,51,82,0.95);border:1px solid var(--border-h);color:#E2E8F0;font-size:0.78rem;box-shadow:0 6px 20px rgba(0,0,0,0.3);min-width:250px;animation:slideD .3s ease-out}
    @keyframes slideD{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .anim-up{animation:fadeInUp .5s ease-out forwards;opacity:0}
    .spinner{animation:spin 1s linear infinite}

    /* ─── DROPDOWN ─── */
    .dropdown{position:relative}
    .dd-panel{display:none;position:absolute;top:calc(100% + 6px);right:0;background:rgba(30,51,82,0.97);border:1px solid var(--border-h);border-radius:9px;width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.3);z-index:60;animation:slideD .2s ease-out}
    .dd-panel.open{display:block}
    .dd-head{padding:12px 14px 8px;font-size:0.8rem;font-weight:600;color:#fff;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
    .dd-clear{font-size:0.68rem;color:var(--accent);background:none;border:none;cursor:pointer}
    .dd-item{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:default;transition:background .15s;display:flex;align-items:center;gap:9px}
    .dd-item:last-child{border-bottom:none}
    .dd-item-title{font-size:0.75rem;color:#E2E8F0;font-weight:500}
    .dd-item-desc{font-size:0.65rem;color:var(--dim);margin-top:1px}

    /* ─── FOOTER ─── */
    .footer{border-top:1px solid var(--border);padding:16px;text-align:center;color:#475569;font-size:0.68rem;max-width:1400px;margin:0 auto}

    /* ─── RESPONSIVE ─── */
    @media(max-width:1024px){.stats{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}
    @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.topbar{padding:0 12px}.main{padding:12px}.sites-list{gap:6px}.site-chip{padding:6px 12px;font-size:0.75rem}}
  </style>
</head>

<body class="grid-bg">

<div class="toast-box" id="toastBox"></div>

<!-- ═══ TOP BAR ═══ -->
<nav class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div class="logo-text"><span>Cyber</span><span class="logo-text-w">Scan</span></div>
  </div>
  <div class="top-actions">
    <button class="tbtn tbtn-pri" onclick="openNewScan()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10"/><path d="M12 2a15 15 0 0 0-4 10 15 15 0 0 0 4 10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      New Scan
    </button>
    <button class="tbtn tbtn-sec" onclick="openExport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <div class="sep"></div>
    <div class="dropdown">
      <button class="tbtn-icon" onclick="toggleDD(event,'dlPanel')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="notif-dot" id="dlDot" style="display:none"></span>
      </button>
      <div class="dd-panel" id="dlPanel">
        <div class="dd-head">Downloads <button class="dd-clear" onclick="clearDls()">Clear all</button></div>
        <div id="dlList"></div>
      </div>
    </div>
    <div class="dropdown">
      <button class="tbtn-icon" onclick="toggleDD(event,'notifPanel')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot"></span>
      </button>
      <div class="dd-panel" id="notifPanel">
        <div class="dd-head">Notifications <button class="dd-clear" onclick="clearNotifs()">Clear all</button></div>
        <div id="notifList"></div>
      </div>
    </div>
  </div>
</nav>

<!-- ═══ SITE SWITCHER ═══ -->
<div class="sites-bar">
  <div class="sites-bar-label">Tested Websites</div>
  <div class="sites-list" id="sitesList"></div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <!-- Selected site info -->
  <div id="siteHeader" style="margin-bottom:16px;"></div>

  <!-- Stats -->
  <div class="stats" id="statsRow"></div>

  <!-- Content -->
  <div class="grid">
    <div style="display:flex;flex-direction:column;gap:14px">
      <!-- Severity Bar Chart -->
      <div class="card anim-up" style="animation-delay:.1s">
        <div class="card-h"><div><div class="card-title">Vulnerability Distribution</div><div class="card-sub">Severity breakdown</div></div></div>
        <div class="bars" id="barChart"></div>
      </div>
      <!-- Findings List -->
      <div class="card anim-up" style="animation-delay:.2s">
        <div class="card-h"><div><div class="card-title">Detailed Findings</div><div class="card-sub" id="findingsCount"></div></div>
        <button
          class="tbtn tbtn-pri"
          style="margin-bottom:14px"
          onclick="generateAIAnalysis(getSiteData().allResults)"
        >
          AI Analysis
        </button>

          <div id="aiAnalysisContainer"></div>
          <div class="card-btns">
            <button class="card-btn card-btn-on" onclick="filterFindings('all')">All</button>
            <button class="card-btn card-btn-off" onclick="filterFindings('Critical')">Critical</button>
            <button class="card-btn card-btn-off" onclick="filterFindings('High')">High</button>
            <button class="card-btn card-btn-off" onclick="filterFindings('Medium')">Medium</button>
            <button class="card-btn card-btn-off" onclick="filterFindings('Low')">Low</button>
            <button class="card-btn card-btn-off" onclick="filterFindings('Info')">Info</button>
          </div>
        </div>
        <div style="overflow-x:auto"><table class="tbl" id="findingsTbl"></table></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <!-- Donut -->
      <div class="card anim-up" style="animation-delay:.15s">
        <div class="card-title" style="margin-bottom:14px">Severity Breakdown</div>
        <div id="donutChart"></div>
      </div>
      <!-- Security Score -->
      <div class="card anim-up" style="animation-delay:.25s">
        <div class="card-title" style="margin-bottom:14px">Security Score</div>
        <div id="scoreRing" style="display:flex;align-items:center;justify-content:center;gap:20px"></div>
      </div>
      <!-- Scan Info -->
      <div class="card anim-up" style="animation-delay:.3s">
        <div class="card-title" style="margin-bottom:12px">Scan Information</div>
        <div id="scanInfo"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer"><p>CyberScan v2.0 — Vulnerability Dashboard &copy; 2026 | Beni Suef National University</p></div>

<!-- ═══ NEW SCAN MODAL ═══ -->
<div class="modal-bg" id="newScanModal">
  <div class="modal">
    <div class="modal-title">New Vulnerability Scan <button class="modal-close" onclick="closeM('newScanModal')">&times;</button></div>
    <div class="form-row"><label class="form-label">Target URL</label><input type="text" class="input-field" id="scanUrl" placeholder="https://example.com" /></div>
    <div class="form-row"><label class="form-label">Vulnerability Scanners</label><div class="cb-group" id="scanCbGroup"></div></div>
    <div class="form-row"><label class="form-label">Scan Mode</label><select class="select-field" id="scanMode" onchange="applyScanMode(this.value)"><option value="quick">Quick Scan</option><option value="standard" selected>Standard Scan</option><option value="deep">Deep Scan</option></select></div>
    <div style="display:flex;gap:8px"><button class="tbtn tbtn-pri" onclick="startScan()" style="flex:1;justify-content:center">Start Scan</button><button class="tbtn tbtn-sec" onclick="resetScanForm()">Reset</button></div>
  </div>
</div>

<!-- ═══ EXPORT MODAL ═══ -->
<div class="modal-bg" id="exportModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-title">Export Report <button class="modal-close" onclick="closeM('exportModal')">&times;</button></div>
    <div class="form-row">
      <label class="form-label">Report for which website?</label>
      <select class="select-field" id="exportTarget" onchange="exportTargetChanged(this.value)"></select>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="tbtn tbtn-sec" style="justify-content:flex-start;padding:12px 14px" onclick="doExport('pdf')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" style="width:18px;height:18px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div style="text-align:left"><div style="color:#fff;font-weight:600">Export as PDF</div><div style="font-size:0.68rem;color:var(--dim)">Professional report for this website</div></div>
      </button>
      <button class="tbtn tbtn-sec" style="justify-content:flex-start;padding:12px 14px" onclick="doExport('json')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#EAB308" stroke-width="2" style="width:18px;height:18px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div style="text-align:left"><div style="color:#fff;font-weight:600">Export as JSON</div><div style="font-size:0.68rem;color:var(--dim)">Machine-readable scan data</div></div>
      </button>
      <button class="tbtn tbtn-sec" style="justify-content:flex-start;padding:12px 14px" onclick="doExport('csv')">

// ══════════════════════════════════════════════════════════════════════════════
// PARSE RESULTS

function parseResults(results) {

  try {

    if (typeof results === 'string') {
      results = JSON.parse(results);
    }

    if (!Array.isArray(results)) {
      return [];
    }

    return results.filter(result => !isNonFindingResult(result)).map(result => ({

      name: formatScannerName(result.name || 'Unknown Scanner'),

      result: result.result || 'Unknown',

      severity: normalizeSeverity(result.severity),

      cve: 'N/A',

      owasp: mapOWASP(result.name || ''),

      cvss: calculateCVSS(result.severity),

      endpoint: extractEndpoint(result.result),

      param: 'N/A',

      detail: result.result || 'No details available'

    }));

  } catch (e) {

    console.error('Result parse error:', e);

    return [];
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════

function isNonFindingResult(result) {
  if (!result || typeof result !== 'object') return false;

  const text = String(
    result.result ||
    result.message ||
    result.status ||
    result.description ||
    result.details ||
    ''
  ).toLowerCase();

  if (text.includes('error:') || text.includes('could not complete')) {
    return false;
  }

  if (result.vulnerable === false) {
    return true;
  }

  return [
    'no vulnerabilities found',
    'no information disclosure detected',
    'clickjacking protection detected',
    'cors configuration appears secure',
    'csrf protection header detected',
    'csrf token found in form',
    'no forms detected',
    'no directory listing detected',
    'rate limiting detected',
    'server delay detected'
  ].some(phrase => text.includes(phrase));
}

function normalizeScanStatus(status) {
  if (!status) return 'completed';
  const value = String(status).toLowerCase();
  if (value === 'done' || value === 'complete') return 'completed';
  return value;
}

function normalizeScanPayload(scan) {
  return {
    id: `CYBERSCAN-${scan.id}`,
    backend_id: scan.id,
    target: scan.target || 'Unknown Target',
    status: normalizeScanStatus(scan.status),
    created_at: scan.created_at || 'Unknown',
    results: parseResults(scan.results)
  };
}

function upsertScan(scanData) {
  const normalized = normalizeScanPayload(scanData);
  const idx = scans.findIndex(s => s.backend_id === normalized.backend_id || s.id === normalized.id);
  if (idx >= 0) scans[idx] = normalized;
  else scans.unshift(normalized);
  activeSite = normalized.target;
  renderAll();
  return normalized;
}

function normalizeSeverity(sev) {

  if (!sev) return 'Low';

  sev = sev.toLowerCase();

  if (sev.includes('critical')) return 'Critical';

  if (sev.includes('high')) return 'High';

  if (sev.includes('medium')) return 'Medium';

  if (sev.includes('info')) return 'Info';

  return 'Low';
}

function calculateCVSS(severity) {

  severity = normalizeSeverity(severity);

  switch (severity) {

    case 'Critical':
      return 9.8;

    case 'High':
      return 7.5;

    case 'Medium':
      return 5.3;

    case 'Low':
      return 3.1;

    case 'Info':
      return 0.0;

    default:
      return 0;
  }
}

function formatScannerName(name) {

  return name
    .replace(/_/g, ' ')
    .replace(/\b\w/g, l => l.toUpperCase());
}

function mapOWASP(name) {

  name = name.toLowerCase();

  if (name.includes('xss') || name.includes('html') || name.includes('sql') || name.includes('injection'))
    return 'A03:2021-Injection';

  if (name.includes('redirect') || name.includes('path') || name.includes('traversal') || name.includes('idor') || name.includes('file_upload') || name.includes('file upload'))
    return 'A01:2021-Broken Access Control';

  if (name.includes('cors') || name.includes('clickjacking') || name.includes('host') || name.includes('info') || name.includes('graphql') || name.includes('dir'))
    return 'A05:2021-Security Misconfiguration';

  if (name.includes('ssrf'))
    return 'A10:2021-SSRF';

  if (name.includes('auth') || name.includes('weak_password') || name.includes('weak password') || name.includes('rate_limit') || name.includes('rate limit'))
    return 'A07:2021-Identification Failures';

  if (name.includes('csrf'))
    return 'A01:2021-Broken Access Control';

  return 'A05:2021-Security Misconfiguration';
}

function extractEndpoint(text) {

  if (!text) return '/';

  const match = text.match(/\/[a-zA-Z0-9\-\/\._]+/);

  return match ? match[0] : '/';
}

function getUniqueTargets() {
  const seen = new Map();
  scans.forEach(s => { if (!seen.has(s.target)) seen.set(s.target, s); });
  return [...seen.entries()].map(([target, s]) => ({target, status:s.status, count: scans.filter(x=>x.target===target).reduce((a,x)=>a+x.results.length,0)}));
}

function getSiteData() {

      dashboardStats.severity_distribution || {}

    const total = dashboardStats.total_findings || 0;
    const crit = sev.Critical || 0;
    const score = Math.max(0, 100 - crit*8 - (sev.High||0)*4 - (sev.Medium||0)*2);
    return {siteScans, allResults, sev, total, crit, score};
  }

  const sev = {Critical:0,High:0,Medium:0,Low:0,Info:0};
  allResults.forEach(r => sev[r.severity]++);
  const total = allResults.length;
  const crit = sev.Critical;
  const score = Math.max(0, 100 - crit*8 - sev.High*4 - sev.Medium*2);
  return {siteScans, allResults, sev, total, crit, score};
}

// --- Donut ---
function renderDonut() {
  const d = getSiteData();
  const total = d.total || 1;
  const items = [
    {label:'Critical',val:d.sev.Critical,color:'#EF4444'},
    {label:'High',val:d.sev.High,color:'#F97316'},
    {label:'Medium',val:d.sev.Medium,color:'#EAB308'},
    {label:'Low',val:d.sev.Low,color:'#22C55E'},
    {label:'Info',val:d.sev.Info,color:'#3B82F6'}
  ];
  const r = 60, cx = 70, cy = 70, sw = 18, circ = 2 * Math.PI * r;
  let offset = 0;
  let arcs = '';
  items.forEach(i => {
    const pct = i.val / total;
    const dash = pct * circ;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${i.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
  });
  document.getElementById('donutChart').innerHTML = `
    <div class="donut-wrap">
      <div style="position:relative;width:140px;height:140px">
        <svg width="140" height="140">${arcs}</svg>
        <div class="donut-center"><div class="donut-total">${d.total}</div><div class="donut-lbl">Total</div></div>

}

function renderDls() {
  const dot = document.getElementById('dlDot');
  dot.style.display = dls.length ? 'block' : 'none';
  const el = document.getElementById('dlList');
  if (!dls.length) { el.innerHTML = '<div style="padding:14px;text-align:center;color:var(--dim);font-size:0.75rem">No downloads yet</div>'; return; }
  const iconMap = {pdf:'📄',json:'📋',csv:'📊'};
  el.innerHTML = dls.map(f => `<div class="dd-item">
    <div style="font-size:1.1rem">${iconMap[f.format]||'📄'}</div>
    <div style="flex:1;min-width:0"><div class="dd-item-title">${f.status==='pending'?'⏳':'✅'} ${f.name}</div><div class="dd-item-desc">${f.size} · ${f.time}${f.status==='pending'?' · '+f.progress+'%':''}</div></div>
    ${f.status==='ready'?`<button onclick="reDownload(${f.id})" style="background:linear-gradient(135deg,var(--accent),var(--cyan));border:none;border-radius:5px;padding:5px 12px;color:#fff;cursor:pointer;font-size:0.68rem;font-weight:600">⬇</button>`:''}
  </div>`).join('');
}

function clearDls() { dls = []; renderDls(); toast('Downloads cleared','info'); }

function reDownload(id) {
  const f = dls.find(x=>x.id===id);
  if (!f) return;
  if (!f.content) { f.content = regenerateContent(f.format, f.target); f.mimeType = f.format==='pdf'?(f.content instanceof Blob?'application/pdf':'text/plain'):f.format==='json'?'application/json':'text/csv'; }
  triggerDownload(f);
  toast(f.name + ' downloaded!','success');
}

function triggerDownload(file) {
  let blob;
  if (file.content instanceof Blob) { blob = file.content; }
  else if (file.content) { blob = new Blob([file.content], {type: file.mimeType || 'application/octet-stream'}); }
  else { toast('File content not available','error'); return; }
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=file.name; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
  } catch(e) { toast('Download failed: '+e.message,'error'); }
}

function regenerateContent(format, target) {
  const d = getSiteDataFor(target);
  if (format==='pdf') return generatePDF(target);
  if (format==='json') return JSON.stringify(d.siteScans,null,2);
  if (format==='csv') {
    const rows = [['ID','Target','Status','Vulnerabilities','Highest','Date']];
    d.siteScans.forEach(s=>rows.push([s.id,s.target,s.status,s.results.length,s.results[0]?.severity||'—',s.created_at]));
    return rows.map(r=>r.join(',')).join('\n');
  }
  return '';
}

function getSiteDataFor(target) {
  const siteScans = target && target !== 'all' ? scans.filter(s=>s.target===target) : scans;
  const allResults = siteScans.flatMap(s=>s.results);
  const sev = {Critical:0,High:0,Medium:0,Low:0,Info:0};
  allResults.forEach(r=>sev[r.severity]++);
  return {siteScans,allResults,sev,total:allResults.length,crit:sev.Critical,score:Math.max(0,100-sev.Critical*8-sev.High*4-sev.Medium*2)};
}

function generatePDF(target) {
  const d = getSiteDataFor(target);
  const date = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  if (typeof window.jspdf === 'undefined') return generateFallback(d,date,target);
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw = doc.internal.pageSize.getWidth();
  const m = 18, cw = pw-m*2;
  let y = 20;

  // Cover
  doc.setFillColor(12,25,41); doc.rect(0,0,pw,60,'F');
  doc.setFillColor(91,141,184); doc.rect(m,12,4,32,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(20); doc.setFont('helvetica','bold');
  doc.text('CYBERSCAN',m+10,26);
  doc.setFontSize(12); doc.setFont('helvetica','normal'); doc.setTextColor(103,197,232);
  doc.text('Vulnerability Assessment Report',m+10,36);
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text(target&&target!=='all'?'Target: '+target:'All Scanned Targets',m+10,46);
  doc.setFontSize(8); doc.setTextColor(180,190,200); doc.setFont('helvetica','normal');
  doc.text('Generated: '+date+'  |  CyberScan v2.0',m+10,54);
  y=68;

  // Org
  doc.setFontSize(8); doc.setTextColor(100,116,139);
  doc.text('Beni Suef National University  |  Faculty of Computers and Information  |  Computer Science Dept.',pw/2,y,{align:'center'}); y+=10;

  // Summary
  doc.setDrawColor(91,141,184); doc.setLineWidth(0.4); doc.line(m,y,m+cw,y); y+=5;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(30,51,82); doc.text('Executive Summary',m,y); y+=7;
  [['Total Scans',String(d.siteScans.length)],['Total Vulnerabilities',String(d.total)],['Security Score',d.score+'/100']].forEach(([l,v])=>{
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100,116,139); doc.text(l+':',m+2,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(30,51,82); doc.text(v,m+52,y); y+=6;
  }); y+=3;

  // Severity
  doc.setDrawColor(91,141,184); doc.line(m,y,m+cw,y); y+=5;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(30,51,82); doc.text('Severity Breakdown',m,y); y+=7;
  doc.setFillColor(24,40,64); doc.rect(m,y,cw,7,'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('Severity',m+3,y+5); doc.text('Count',m+cw-18,y+5); y+=7;
  [['Critical',d.sev.Critical,[239,68,68]],['High',d.sev.High,[249,115,22]],['Medium',d.sev.Medium,[234,179,8]],['Low',d.sev.Low,[34,197,94]],['Info',d.sev.Info,[59,130,246]]].forEach(([s,c,rgb])=>{
    doc.setFillColor(rgb[0],rgb[1],rgb[2]); doc.roundedRect(m+2,y+1,3,3,0.5,0.5,'F');
    doc.setFont('helvetica','normal'); doc.setTextColor(60,70,85); doc.setFontSize(8); doc.text(s,m+9,y+4);
    doc.setFont('helvetica','bold'); doc.text(String(c),m+cw-18,y+4); y+=6;
  }); y+=5;

  // Findings
  doc.setDrawColor(91,141,184); doc.line(m,y,m+cw,y); y+=5;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(30,51,82); doc.text('Detailed Findings',m,y); y+=7;
  d.siteScans.forEach(scan=>{
    if(y>255){doc.addPage();y=20;}
    doc.setFillColor(24,40,64); doc.roundedRect(m,y-1,cw,6,1,1,'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
    doc.text('Scan: '+scan.id+'  |  '+scan.target,m+3,y+3); y+=7;
    doc.setFont('helvetica','normal'); doc.setTextColor(100,116,139); doc.setFontSize(7);
    doc.text('Status: '+scan.status.toUpperCase()+'    Date: '+scan.created_at+'    Findings: '+scan.results.length,m+3,y); y+=5;
    const sevC2={Critical:[239,68,68],High:[249,115,22],Medium:[234,179,8],Low:[34,197,94],Info:[59,130,246]};
    scan.results.forEach((r,i)=>{
      if(y>255){doc.addPage();y=20;}
      const c2=sevC2[r.severity]||[100,100,100];
      doc.setFillColor(c2[0],c2[1],c2[2]); doc.roundedRect(m+3,y-1,2.5,2.5,0.4,0.4,'F');
      doc.setTextColor(60,70,85); doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.text((i+1)+'. ['+r.severity+'] '+r.name,m+8,y); y+=4;
      doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(100,116,139);
      let meta = 'CVSS: '+(r.cvss||'N/A');
      if(r.cve&&r.cve!=='N/A') meta +='  |  '+r.cve;
      if(r.owasp) meta +='  |  '+r.owasp;
      if(r.endpoint) meta +='  |  '+r.endpoint;
      if(r.param&&r.param!=='N/A') meta +='  |  param: '+r.param;
      doc.text(meta,m+8,y); y+=3.5;
      if(r.detail){
        doc.setTextColor(80,90,105); doc.setFontSize(6.5);
        const lines = doc.splitTextToSize(r.detail, cw-12);
        lines.slice(0,3).forEach(ln=>{doc.text(ln,m+8,y);y+=3;});
      }
      y+=2;
    }); y+=3;
  });

  // Risk + Recommendations
  if(y>225){doc.addPage();y=20;}
  doc.setDrawColor(91,141,184); doc.line(m,y,m+cw,y); y+=5;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(30,51,82); doc.text('Risk Assessment & Recommendations',m,y); y+=7;
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  if(d.crit>0){doc.setTextColor(239,68,68);doc.text('CRITICAL: '+d.crit+' vulnerabilities need immediate action.',m+2,y);y+=5;}
  if(d.sev.High>0){doc.setTextColor(249,115,22);doc.text('HIGH: '+d.sev.High+' issues should be prioritized.',m+2,y);y+=5;}
  doc.setTextColor(60,70,85);
  ['1. Patch Critical vulnerabilities within 24 hours','2. Address High severity issues within 72 hours','3. Implement input validation and parameterized queries','4. Deploy Content Security Policy headers','5. Enable HSTS on all web applications'].forEach(r=>{
    if(y>275){doc.addPage();y=20;} doc.text(r,m+2,y); y+=5;
  });

  // Footer
  y+=6; if(y>270){doc.addPage();y=20;}
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.2); doc.line(m,y,m+cw,y); y+=5;
  doc.setFontSize(7); doc.setTextColor(150,150,150);
  doc.text('Report generated by CyberScan v2.0  |  © 2026 Beni Suef National University',pw/2,y,{align:'center'});

  return doc.output('blob');
}

function generateFallback(d,date,target) {
  let lines = ['CYBERSCAN - VULNERABILITY REPORT'];
  if(target&&target!=='all') lines.push('Target: '+target); else lines.push('Target: All Scanned Targets');
  lines.push('Generated: '+date,'','Total: '+d.total,'Critical: '+d.crit,'High: '+d.sev.High,'Medium: '+d.sev.Medium,'Low: '+d.sev.Low,'Info: '+d.sev.Info,'Score: '+d.score+'/100','');
  d.siteScans.forEach(s=>{lines.push(s.id+' | '+s.target+' | '+s.status);s.results.forEach((r,i)=>lines.push('  '+(i+1)+'. ['+r.severity+'] '+r.name+' - '+r.result));lines.push('');});
  return lines.join('\n');
}

function openExport() {
  const sel = document.getElementById('exportTarget');
  const targets = [...new Set(scans.map(s=>s.target))];
  sel.innerHTML = '<option value="all">All Scanned Targets</option>';
  targets.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
  sel.value = activeSite === 'all' ? 'all' : activeSite;
  exportTarget = sel.value;
  document.getElementById('exportModal').classList.add('open');
  closeDDs();
}

function exportTargetChanged(v) { exportTarget = v; }

function doExport(format) {
  closeM('exportModal');
  const target = exportTarget || activeSite;
  const d = getSiteDataFor(target);
  let content, filename, type;
  const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
  const targetSlug = target && target !== 'all' ? target.replace(/[^a-zA-Z0-9]/g,'_') : 'all-targets';

  if (format==='pdf') {
    content = generatePDF(target);
    filename = `report-${targetSlug}-${ts}.pdf`;
    type = content instanceof Blob ? 'application/pdf' : 'text/plain';
  } else if (format==='json') {
    content = JSON.stringify(d.siteScans, null, 2);
    filename = `report-${targetSlug}-${ts}.json`;
    type = 'application/json';
  } else {
    const rows = [['ID','Target','Status','Vulnerabilities','Highest','Date']];
    d.siteScans.forEach(s=>rows.push([s.id,s.target,s.status,s.results.length,s.results[0]?.severity||'—',s.created_at]));
    content = rows.map(r=>r.join(',')).join('\n');
    filename = `report-${targetSlug}-${ts}.csv`;
    type = 'text/csv';
  }
  const size = ((content instanceof Blob ? content.size : new Blob([content]).size)/1024).toFixed(1)+' KB';
  const id = ++dlIdCtr;
  dls.unshift({id,name:filename,format,target,size,time:'Just now',content,mimeType:type,status:'ready'});
  triggerDownload(dls[0]);
  toast(`${format.toUpperCase()} report for ${target==='all'?'all sites':target} downloaded!`,'success');
  renderDls();
}

// ══════════════════════════════════════════════════════════════════════════════
//  NEW SCAN
// ══════════════════════════════════════════════════════════════════════════════

async function pollScanStatus(scanId) {
  try {
    const response = await fetch(`/scan-status/${scanId}`);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to read scan status');
    }

    const scan = upsertScan(data.scan);

    if (scan.status === 'running') {
      loadDashboardStats().then(renderAll);
      scanTimer = setTimeout(() => pollScanStatus(scanId), 2000);
      return;
    }

    scanInProgress = false;
    await loadDashboardStats();
    toast(`Scan ${scan.status}: ${scan.target}`,'success');
    notifs.unshift({
      title: `Scan ${scan.status}`,
      desc: `${scan.target} - ${scan.results.length} finding(s)`,
      time: 'Just now',
      type: scan.status === 'failed' ? 'error' : 'success'
    });
    renderAll();

  } catch (err) {
    scanInProgress = false;
    toast(err.message || 'Failed to update scan status','error');
    notifs.unshift({title:'Scan status error',desc:err.message || 'Unknown error',time:'Just now',type:'error'});
    renderAll();
  }
}

function openNewScan(prefill) {
  document.getElementById('newScanModal').classList.add('open');
  document.getElementById('scanUrl').value = prefill || '';
  document.getElementById('scanMode').value = 'standard';
  renderCbs();
  closeDDs();
}

function renderCbs(selectedModules = modules) {
  const selected = new Set(selectedModules);
  document.getElementById('scanCbGroup').innerHTML = modules.map(m=>`<div class="cb-item ${selected.has(m) ? 'checked' : ''}" onclick="this.classList.toggle('checked')">${m}</div>`).join('');
}

function applyScanMode(mode) {
  if (mode === 'quick') {
    renderCbs(quickScanModules);
    toast('Quick Scan selected: safe demo scanners only','info');
    return;
  }

  renderCbs(modules);
}

function resetScanForm() {
  document.getElementById('scanUrl').value = '';
  document.getElementById('scanMode').value = 'standard';
  renderCbs();
}

async function startScan() {
  const url = document.getElementById('scanUrl').value.trim();
  if (!url) { toast('Please enter a target URL','error'); return; }
  const sel = [...document.querySelectorAll('#scanCbGroup .cb-item.checked')].map(e=>moduleValues[e.textContent] || e.textContent);
  if (!sel.length) { toast('Select at least one scanner','error'); return; }
  closeM('newScanModal');
  const newId = 'CYBERSCAN-'+String(scans.length+1).padStart(3,'0');
  const ns = {id:newId,target:url,results:[],status:'running',created_at:new Date().toISOString().slice(0,16).replace('T',' ')};
  scans.unshift(ns);
  scanInProgress = true;
  activeSite = url;
  toast('Scan started: '+url,'info');
  renderAll();

  try {
    const response = await fetch('/scan-live', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, vulns: sel})
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to start scan');
    }

    ns.id = `CYBERSCAN-${data.scan_id}`;
    ns.backend_id = data.scan_id;
    notifs.unshift({title:'Scan started',desc:url,time:'Just now',type:'info'});
    toast('Real scan started: '+url,'success');
    await loadDashboardStats();
    renderAll();
    pollScanStatus(data.scan_id);
  } catch (err) {
    scanInProgress = false;
    ns.status = 'failed';
    toast(err.message || 'Scan failed to start','error');
    notifs.unshift({title:'Scan error',desc:err.message || 'Unknown error',time:'Just now',type:'error'});
    renderAll();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  UTILITY
// ══════════════════════════════════════════════════════════════════════════════

function closeM(id) { document.getElementById(id).classList.remove('open'); }

function toggleDD(e,id) {
  e.stopPropagation();
  const p = document.getElementById(id);
  const was = p.classList.contains('open');
  closeDDs();
  if (!was) p.classList.add('open');
}

function closeDDs() { document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open')); }

document.addEventListener('click', closeDDs);

function toast(msg,type='info') {
  const el = document.getElementById('toastBox');
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  el.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

async function generateAIAnalysis(scanResults) {

  try {

    const response = await fetch("/ai-analysis", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        scan_results: scanResults
      })

    });

    const data = await response.json();

    showAIAnalysis(data);

  } catch (err) {

    console.error("AI Error:", err);

    toast("AI Analysis Failed", "error");

  }
}

function showAIAnalysis(data) {

  let html = `
    <div class="card" style="margin-top:14px">
      <div class="card-title">AI Security Analysis</div>

      <p style="margin-top:10px;color:#CBD5E1">
        ${data.summary}

  `;

  data.vulnerabilities.forEach(v => {

    html += `
      <div style="
        margin-top:12px;
        padding:12px;
        border:1px solid rgba(255,255,255,0.08);
        border-radius:8px;
      ">

        <h4 style="color:white">
          ${v.name}
        </h4>

        <p>
          <strong>Severity:</strong>
          ${v.severity}
        </p>

        <p>
          <strong>Description:</strong>
          ${v.description}
        </p>

        <p>
          <strong>Fix:</strong>
          ${v.fix}
        </p>

        <p>
          <strong>Confidence:</strong>
          ${v.confidence}
        </p>

      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("aiAnalysisContainer").innerHTML = html;
}
